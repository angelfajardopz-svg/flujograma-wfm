<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flujograma WFM + Trello | ITSINFOCOM</title>
    <style>
      :root{
        --c-blue-dark:#005A9D;
        --c-blue:#00AEEF;
        --c-green:#8DC63F;
        --c-lime:#B5D334;
        --c-orange:#F58220;
        --c-bg:#0a0e17;
        --c-bg2:#111826;
        --c-panel:#161f30;
        --c-line:rgba(255,255,255,0.12);
        --c-text:#e8eef7;
        --c-muted:#8d9bb3;
        --c-yes:#8DC63F;
        --c-no:#F58220;
      }
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{background:var(--c-bg);color:var(--c-text);font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;overflow-x:hidden}
      body{
        background:
          radial-gradient(ellipse at top left, rgba(0,174,239,0.12), transparent 50%),
          radial-gradient(ellipse at bottom right, rgba(245,130,32,0.10), transparent 50%),
          radial-gradient(ellipse at center, rgba(141,198,63,0.05), transparent 70%),
          var(--c-bg);
      }

      /* HEADER */
      .header{
        position:sticky;top:0;z-index:100;
        background:rgba(10,14,23,0.85);
        backdrop-filter:blur(14px);
        border-bottom:1px solid var(--c-line);
        padding:18px 32px;
      }
      .header-inner{
        max-width:1400px;margin:0 auto;
        display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;
      }
      .brand{display:flex;align-items:center;gap:16px}
      .brand img{height:52px;width:auto;filter:drop-shadow(0 4px 12px rgba(0,174,239,0.25))}
      .brand-text h1{
        font-size:18px;font-weight:700;letter-spacing:0.5px;
        background:linear-gradient(90deg,var(--c-blue) 0%, var(--c-green) 50%, var(--c-orange) 100%);
        -webkit-background-clip:text;background-clip:text;color:transparent;
      }
      .brand-text p{font-size:12px;color:var(--c-muted);margin-top:2px;letter-spacing:0.3px}

      .legend{display:flex;gap:14px;flex-wrap:wrap}
      .legend-item{
        display:flex;align-items:center;gap:8px;
        background:var(--c-panel);
        padding:7px 14px;border-radius:20px;
        border:1px solid var(--c-line);
        font-size:12px;font-weight:500;
